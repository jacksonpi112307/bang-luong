<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Quản Lý Lương Pro</title>
<style>
:root {
    --primary: #1a1a1a; --bg: #f5f5f0; --card: #fff; --border: #e0ddd6;
    --green: #3B6D11; --amber: #8a5c00; --blue: #185FA5; --red: #A32D2D;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--primary); line-height: 1.4; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.content { flex: 1; padding: 16px; padding-bottom: 80px; }
.section { display: none; } .section.active { display: block; }

/* Tabs */
.tab-bar { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
.tab { flex: 1; padding: 12px; border: none; background: none; font-size: 11px; color: #888; cursor: pointer; }
.tab.active { color: var(--primary); font-weight: bold; }

/* Calendar */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day { background: var(--card); border: 1px solid var(--border); border-radius: 8px; min-height: 55px; display: flex; flex-direction: column; align-items: center; padding: 4px; cursor: pointer; }
.day-n { font-size: 13px; font-weight: bold; }
.tags { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 2px; }
.tag { font-size: 8px; padding: 1px 3px; border-radius: 3px; color: #fff; }

/* Sheet */
.sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; align-items: flex-end; }
.sheet-bg.open { display: flex; }
.sheet { background: var(--card); width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 85vh; overflow-y: auto; }
.status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
.sbtn { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #fff; font-weight: 600; }
.sbtn.active { border-color: var(--primary); background: #f0f0f0; }
.hour-input-group { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.hour-input-group input { width: 60px; padding: 5px; text-align: center; border: 1px solid var(--border); border-radius: 5px; }

/* Settings */
.card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
.card-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; margin-top: 5px; }
.wt-item { border-bottom: 1px solid #eee; padding: 10px 0; }
</style>
</head>
<body>

<div class="app">
    <div class="content">
        <div id="sec-cong" class="section active">
            <h2 style="margin-bottom:15px">Tháng <span id="month-label"></span></h2>
            <div class="cal-grid" id="calendar"></div>
            <div id="summary-card" class="card" style="margin-top:20px"></div>
        </div>

        <div id="sec-luong" class="section">
            <h2 style="margin-bottom:15px">Bảng tính lương</h2>
            <div id="salary-detail" class="card"></div>
        </div>

        <div id="sec-settings" class="section">
            <h2 style="margin-bottom:15px">Cài đặt biến & Công thức</h2>
            <div class="card">
                <div class="card-title">Biến hệ thống</div>
                <label>Lương cơ bản (đ/tháng)</label>
                <input type="number" id="base-salary" oninput="saveCfg()">
                <label style="margin-top:10px; display:block">Số ngày công chuẩn (VD: 26)</label>
                <input type="number" id="std-days" oninput="saveCfg()">
            </div>

            <div class="card">
                <div class="card-title">Loại ngày công (Tự tùy chỉnh)</div>
                <div id="wt-list"></div>
                <button onclick="addWT()" style="width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px dashed #888; background:none">+ Thêm loại công mới</button>
            </div>

            <div class="card">
                <div class="card-title">Công thức Excel (Dùng các biến trên)</div>
                <textarea id="formula" rows="4" oninput="saveCfg()" placeholder="Ví dụ: (baseSalary / stdDays) * workDays + (baseSalary / stdDays / 8) * otHours * 1.5"></textarea>
                <p style="font-size:11px; color:#888; margin-top:5px">Sử dụng: <b>baseSalary, stdDays</b> và các <b>Mã biến</b> của loại công.</p>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab active" onclick="showSec('cong')">Chấm công</button>
        <button class="tab" onclick="showSec('luong')">Tính lương</button>
        <button class="tab" onclick="showSec('settings')">Cài đặt</button>
    </div>
</div>

<div class="sheet-bg" id="sheet-bg" onclick="if(event.target==this) closeSheet()">
    <div class="sheet">
        <h3 id="sheet-date">Ngày</h3>
        <p style="font-size:12px; color:#888">Bấm để chọn/hủy. Có thể chọn nhiều loại.</p>
        <div class="status-grid" id="status-grid"></div>
        <div id="hour-inputs"></div>
        <button onclick="closeSheet()" style="width:100%; padding:15px; background:#1a1a1a; color:#fff; border:none; border-radius:12px; font-weight:bold; margin-top:10px">XONG</button>
    </div>
</div>

<script>
let Y = new Date().getFullYear(), M = new Date().getMonth();
let att = JSON.parse(localStorage.getItem('att_v2') || '{}');
let cfg = JSON.parse(localStorage.getItem('cfg_v2') || JSON.stringify({
    baseSalary: 10000000,
    stdDays: 26,
    formula: "(baseSalary / stdDays) * workDays + (baseSalary / stdDays / 8) * otHours * 1.5",
    wt: [
        { id: 'w1', name: 'Ngày thường', var: 'workDays', color: '#3B6D11' },
        { id: 'w2', name: 'Tăng ca', var: 'otHours', color: '#8a5c00' },
        { id: 'w3', name: 'Chủ Nhật', var: 'sunHours', color: '#185FA5' }
    ]
}));

let curDay = null;

function saveCfg() {
    cfg.baseSalary = parseFloat(document.getElementById('base-salary').value) || 0;
    cfg.stdDays = parseFloat(document.getElementById('std-days').value) || 1;
    cfg.formula = document.getElementById('formula').value;
    localStorage.setItem('cfg_v2', JSON.stringify(cfg));
    renderAll();
}

function renderAll() {
    renderCalendar();
    renderSummary();
    renderWTList();
}

function renderCalendar() {
    document.getElementById('month-label').innerText = (M + 1) + "/" + Y;
    const daysInMonth = new Date(Y, M + 1, 0).getDate();
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';

    for (let d = 1; d <= daysInMonth; d++) {
        const key = `${Y}-${M}-${d}`;
        const dayData = att[key] || {};
        let tagsHtml = '';
        
        Object.keys(dayData).forEach(wtId => {
            const type = cfg.wt.find(t => t.id === wtId);
            if(type) tagsHtml += `<span class="tag" style="background:${type.color}">${dayData[wtId]}</span>`;
        });

        cal.innerHTML += `
            <div class="day" onclick="openDay(${d})">
                <span class="day-n">${d}</span>
                <div class="tags">${tagsHtml}</div>
            </div>`;
    }
}

function openDay(d) {
    curDay = d;
    const key = `${Y}-${M}-${d}`;
    document.getElementById('sheet-date').innerText = `Ngày ${d} tháng ${M+1}`;
    document.getElementById('sheet-bg').classList.add('open');
    renderSheetContent();
}

function renderSheetContent() {
    const key = `${Y}-${M}-${curDay}`;
    const dayData = att[key] || {};
    
    const grid = document.getElementById('status-grid');
    grid.innerHTML = cfg.wt.map(type => `
        <button class="sbtn ${dayData[type.id] ? 'active' : ''}" onclick="toggleWT('${type.id}')">
            ${type.name}
        </button>
    `).join('');

    const hours = document.getElementById('hour-inputs');
    hours.innerHTML = Object.keys(dayData).map(wtId => {
        const type = cfg.wt.find(t => t.id === wtId);
        return `
            <div class="hour-input-group">
                <span>Số giờ/công cho <b>${type.name}</b></span>
                <input type="number" step="0.1" value="${dayData[wtId]}" oninput="updateHour('${wtId}', this.value)">
            </div>
        `;
    }).join('');
}

function toggleWT(id) {
    const key = `${Y}-${M}-${curDay}`;
    if (!att[key]) att[key] = {};
    
    if (att[key][id]) {
        delete att[key][id];
    } else {
        att[key][id] = (id === 'w1') ? 1 : 4; // Mặc định 1 công hoặc 4h
    }
    
    localStorage.setItem('att_v2', JSON.stringify(att));
    renderSheetContent();
    renderAll();
}

function updateHour(id, val) {
    const key = `${Y}-${M}-${curDay}`;
    att[key][id] = parseFloat(val) || 0;
    localStorage.setItem('att_v2', JSON.stringify(att));
    renderAll();
}

function closeSheet() { document.getElementById('sheet-bg').classList.remove('open'); }

function renderSummary() {
    const totals = {};
    cfg.wt.forEach(t => totals[t.var] = 0);

    Object.values(att).forEach(day => {
        Object.entries(day).forEach(([wtId, val]) => {
            const type = cfg.wt.find(t => t.id === wtId);
            if (type) totals[type.var] += val;
        });
    });

    // Tính lương bằng Eval (Excel-like)
    let finalSalary = 0;
    try {
        let f = cfg.formula;
        f = f.replace(/baseSalary/g, cfg.baseSalary);
        f = f.replace(/stdDays/g, cfg.stdDays);
        cfg.wt.forEach(t => {
            f = f.replace(new RegExp(t.var, 'g'), totals[t.var] || 0);
        });
        finalSalary = eval(f);
    } catch(e) { finalSalary = 0; }

    document.getElementById('summary-card').innerHTML = `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            ${cfg.wt.map(t => `<div>${t.name}: <b>${totals[t.var]}</b></div>`).join('')}
        </div>
        <div style="margin-top:15px; padding-top:10px; border-top:1px solid #eee">
            Dự kiến nhận: <b style="color:var(--green); font-size:20px">${Math.round(finalSalary).toLocaleString()}đ</b>
        </div>
    `;
    
    document.getElementById('salary-detail').innerText = `Lương thực nhận: ${Math.round(finalSalary).toLocaleString()}đ`;
}

function renderWTList() {
    const list = document.getElementById('wt-list');
    list.innerHTML = cfg.wt.map((t, index) => `
        <div class="wt-item">
            <input type="text" value="${t.name}" oninput="cfg.wt[${index}].name=this.value;saveCfg()" style="width:45%">
            <input type="text" value="${t.var}" oninput="cfg.wt[${index}].var=this.value;saveCfg()" style="width:35%" placeholder="Mã biến">
            <button onclick="removeWT(${index})" style="width:15%; color:red; border:none; background:none">X</button>
        </div>
    `).join('');
    
    document.getElementById('base-salary').value = cfg.baseSalary;
    document.getElementById('std-days').value = cfg.stdDays;
    document.getElementById('formula').value = cfg.formula;
}

function addWT() {
    const newId = 'w' + Date.now();
    cfg.wt.push({ id: newId, name: 'Loại mới', var: 'newVar', color: '#888' });
    saveCfg();
}

function removeWT(i) {
    cfg.wt.splice(i, 1);
    saveCfg();
}

function showSec(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + id).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

renderAll();
</script>
</body>
</html>
