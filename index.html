<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Bảng Lương</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a}
:root{
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:#C0DD97;
  --amber:#8a5c00;--amber-bg:#FFF8E6;--amber-bd:#F5C842;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:#B5D4F4;
  --pink:#8B3A5E;--pink-bg:#FBEAF0;--pink-bd:#F4C0D1;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-bd:#F7C1C1;
  --gray:#555;--gray-bg:#F1EFE8;--gray-bd:#D3D1C7;
  --surface:#fff;--page:#f5f5f0;--border:#e0ddd6;--text:#1a1a1a;--muted:#888;
  --radius:12px;--rsm:8px;
}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--page)}
.tab-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,0px);order:2;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:#1a1a1a}.tab.active svg{stroke:#1a1a1a}
.content{flex:1;overflow-y:auto;order:1;-webkit-overflow-scrolling:touch}
.section{display:none;padding:16px;padding-bottom:32px}.section.active{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.month-nav{display:flex;align-items:center;gap:8px}
.nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--gray)}
.month-title{font-size:14px;font-weight:600;min-width:90px;text-align:center}
.card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{font-size:10px;font-weight:600;text-align:center;color:var(--muted);padding:4px 0}
.day{min-height:42px;border-radius:7px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);gap:1px;position:relative}
.day-n{font-size:12px;font-weight:600}
.day-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;width:100%}
.day-tag{width:6px;height:6px;border-radius:50%}
.total-box{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--green-bg);border-radius:var(--rsm);margin-top:12px;border:1px solid var(--green-bd)}
.total-lbl{font-size:14px;font-weight:600;color:var(--green)}
.total-val{font-size:22px;font-weight:800;color:var(--green)}
.sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbtn{padding:13px 8px;border:1.5px solid var(--border);border-radius:var(--rsm);background:var(--surface);cursor:pointer;font-size:13px;font-weight:600;text-align:center;color:var(--gray)}
.sbtn.active{border-color:var(--text);background:var(--gray-bg);color:var(--text)}
.hour-row{display:flex;align-items:center;justify-content:space-between;padding:10px;background:var(--page);border-radius:var(--rsm);margin-top:8px}
.hour-row input{width:70px;padding:6px;text-align:center;border:1px solid var(--border);border-radius:6px;font-weight:bold}
input[type=number], input[type=text], textarea { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; font-size:14px; margin-top:5px; outline:none; }
.wt-item{border-bottom:1px solid var(--border);padding:10px 0}
.wt-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app">
  <div class="content">
    <div class="section active" id="sec-cong">
      <div class="page-header">
        <div class="page-title">Chấm công</div>
        <div class="month-nav">
          <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
          <span class="month-title" id="month-label"></span>
          <button class="nav-btn" onclick="changeMonth(1)">›</button>
        </div>
      </div>
      <div class="card">
        <div class="cal-grid" id="cal-heads"></div>
        <div class="cal-grid" id="calendar"></div>
      </div>
      <div id="summary-card"></div>
    </div>

    <div class="section" id="sec-luong">
      <div class="page-header"><div class="page-title">Bảng lương</div></div>
      <div class="card" id="salary-breakdown"></div>
    </div>

    <div class="section" id="sec-settings">
      <div class="page-header"><div class="page-title">Cài đặt</div></div>
      <div class="card">
        <div class="card-title">Biến hệ thống</div>
        <label style="font-size:12px;color:var(--muted)">Lương cơ bản (baseSalary)</label>
        <input type="number" id="base-salary" oninput="saveCfg()">
        <label style="font-size:12px;color:var(--muted);margin-top:10px;display:block">Ngày công chuẩn (stdDays)</label>
        <input type="number" id="std-days" oninput="saveCfg()">
      </div>
      <div class="card">
        <div class="card-title">Loại công & Mã biến</div>
        <div id="wt-list"></div>
        <button onclick="addWT()" style="width:100%;padding:10px;margin-top:10px;border:1px dashed var(--border);background:none;color:var(--muted);border-radius:8px">+ Thêm loại công</button>
      </div>
      <div class="card">
        <div class="card-title">Công thức Excel</div>
        <textarea id="formula" rows="3" oninput="saveCfg()"></textarea>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('cong',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Chấm công</button>
    <button class="tab" onclick="switchTab('luong',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9h1a2 2 0 1 1 0 4H9v2h5"/></svg>Lương</button>
    <button class="tab" onclick="switchTab('settings',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Cài đặt</button>
  </div>
</div>

<div class="sheet-bg" id="sheet-bg" onclick="if(event.target==this)closeSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3 id="sheet-date" style="margin-bottom:15px">Ngày</h3>
    <div class="status-grid" id="status-grid"></div>
    <div id="hour-inputs" style="margin-top:10px"></div>
    <button onclick="closeSheet()" style="width:100%;padding:15px;background:var(--text);color:#fff;border:none;border-radius:12px;font-weight:700;margin-top:20px">Xong</button>
  </div>
</div>

<script>
let Y=new Date().getFullYear(), M=new Date().getMonth(), curDay=null;
const WDAYS=['CN','T2','T3','T4','T5','T6','T7'], COLORS=['var(--green)','var(--amber)','var(--blue)','var(--pink)','var(--red)'];
let cfg=JSON.parse(localStorage.getItem('cfg_pro')||JSON.stringify({
  baseSalary:10000000,stdDays:26,
  formula:"(baseSalary / stdDays) * workDays + (baseSalary / stdDays / 8) * otHours * 1.5",
  wt:[{id:'w1',name:'Ngày thường',var:'workDays',ci:0},{id:'w2',name:'Tăng ca',var:'otHours',ci:1},{id:'w3',name:'Chủ Nhật',var:'sunHours',ci:2}]
}));
let att=JSON.parse(localStorage.getItem('att_pro')||'{}');

function saveCfg(){
  cfg.baseSalary=parseFloat(document.getElementById('base-salary').value)||0;
  cfg.stdDays=parseFloat(document.getElementById('std-days').value)||1;
  cfg.formula=document.getElementById('formula').value;
  localStorage.setItem('cfg_pro',JSON.stringify(cfg)); renderAll();
}

function renderAll(){ renderCalendar(); renderSummary(); renderWTList(); }

function renderCalendar(){
  document.getElementById('month-label').innerText=`T${M+1}/${Y}`;
  document.getElementById('cal-heads').innerHTML=WDAYS.map(d=>`<div class="cal-head">${d}</div>`).join('');
  const total=new Date(Y,M+1,0).getDate(), first=new Date(Y,M,1).getDay();
  const cal=document.getElementById('calendar'); cal.innerHTML='';
  for(let i=0;i<first;i++)cal.innerHTML+='<div></div>';
  for(let d=1;d<=total;d++){
    const dayData=att[`${Y}-${M}-${d}`]||{};
    let dots=Object.keys(dayData).map(id=>{
      const t=cfg.wt.find(x=>x.id===id); return `<div class="day-tag" style="background:${COLORS[t?t.ci:0]}"></div>`;
    }).join('');
    cal.innerHTML+=`<div class="day" onclick="openDay(${d})"><span class="day-n">${d}</span><div class="day-tags">${dots}</div></div>`;
  }
}

function openDay(d){
  curDay=d; document.getElementById('sheet-date').innerText=`Ngày ${d}/${M+1}`;
  document.getElementById('sheet-bg').classList.add('open'); renderSheet();
}

function renderSheet(){
  const dayData=att[`${Y}-${M}-${curDay}`]||{};
  document.getElementById('status-grid').innerHTML=cfg.wt.map(t=>`
    <button class="sbtn ${dayData[t.id]?'active':''}" onclick="toggleWT('${t.id}')">${t.name}</button>
  `).join('');
  document.getElementById('hour-inputs').innerHTML=Object.keys(dayData).map(id=>{
    const t=cfg.wt.find(x=>x.id===id);
    return `<div class="hour-row"><span>Giờ/Công: ${t.name}</span><input type="number" step="0.1" value="${dayData[id]}" oninput="updateH('${id}',this.value)"></div>`;
  }).join('');
}

function toggleWT(id){
  const k=`${Y}-${M}-${curDay}`; if(!att[k])att[k]={};
  if(att[k][id])delete att[k][id]; else att[k][id]=(id==='w1'?1:4);
  localStorage.setItem('att_pro',JSON.stringify(att)); renderSheet(); renderAll();
}

function updateH(id,v){ att[`${Y}-${M}-${curDay}`][id]=parseFloat(v)||0; localStorage.setItem('att_pro',JSON.stringify(att)); renderAll(); }
function closeSheet(){ document.getElementById('sheet-bg').classList.remove('open'); }

function renderSummary(){
  const totals={}; cfg.wt.forEach(t=>totals[t.var]=0);
  Object.values(att).forEach(d=>Object.entries(d).forEach(([id,v])=>{
    const t=cfg.wt.find(x=>x.id===id); if(t)totals[t.var]+=v;
  }));
  let salary=0; try{
    let f=cfg.formula.replace(/baseSalary/g,cfg.baseSalary).replace(/stdDays/g,cfg.stdDays);
    cfg.wt.forEach(t=> f=f.replace(new RegExp(t.var,'g'),totals[t.var])); salary=eval(f);
  }catch(e){salary=0}
  const html=`<div class="total-box"><span class="total-lbl">Dự kiến nhận:</span><span class="total-val">${Math.round(salary).toLocaleString()}đ</span></div>`;
  document.getElementById('summary-card').innerHTML=html;
  document.getElementById('salary-breakdown').innerHTML=cfg.wt.map(t=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee"><span>${t.name}</span><b>${totals[t.var]}</b></div>`).join('')+html;
}

function renderWTList(){
  document.getElementById('base-salary').value=cfg.baseSalary; document.getElementById('std-days').value=cfg.stdDays; document.getElementById('formula').value=cfg.formula;
  document.getElementById('wt-list').innerHTML=cfg.wt.map((t,i)=>`
    <div class="wt-item" style="display:flex;gap:5px">
      <input style="flex:2" type="text" value="${t.name}" oninput="cfg.wt[${i}].name=this.value;saveCfg()">
      <input style="flex:1" type="text" value="${t.var}" oninput="cfg.wt[${i}].var=this.value;saveCfg()">
      <button onclick="cfg.wt.splice(${i},1);saveCfg()" style="border:none;background:none;color:red;padding:0 5px">✕</button>
    </div>
  `).join('');
}
function addWT(){ cfg.wt.push({id:'w'+Date.now(),name:'Mới',var:'bienMoi',ci:cfg.wt.length%5}); saveCfg(); }
function switchTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
}
function changeMonth(d){ M+=d; if(M<0){M=11;Y--} if(M>11){M=0;Y++} renderAll(); }
renderAll();
</script>
</body>
</html>
